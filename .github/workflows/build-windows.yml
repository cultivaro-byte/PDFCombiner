name: Build Windows EXE

# Build PDFCombiner.exe on a Windows runner in the cloud.
# Triggers:
#   - every push to any branch
#   - the manual "Run workflow" button on the Actions tab
#   - pushing a tag like v1.0.0 (also publishes a downloadable Release)
on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build standalone EXE
        run: pyinstaller --clean --noconfirm PDFCombiner.spec

      # The exe lands in dist\PDFCombiner.exe on the runner.
      - name: Upload EXE as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFCombiner-exe
          path: dist/PDFCombiner.exe
          if-no-files-found: error

      # When you push a version tag (e.g. v1.0.0) the exe is also attached to a
      # GitHub Release, giving you a permanent download link.
      - name: Attach EXE to a Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDFCombiner.exe
